<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Team Ops · Crabbie Ops</title>
  <link rel="icon" type="image/jpeg" href="ui/assets/crabbie-logo.jpg">
  <link rel="apple-touch-icon" href="ui/assets/crabbie-logo.jpg">
  <link rel="stylesheet" href="ui/STYLE_TOKENS_V1.css">
  <link rel="stylesheet" href="ui/COMPONENTS_V1.css">
  <style>
    .board{align-items:start}
    .task-card{cursor:grab}
    .task-card.dragging{opacity:.55}
    .task-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .task-pending{margin-top:8px;padding:8px;border:1px dashed var(--border-2);border-radius:8px}
    .dialog{width:min(760px,96vw);border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text)}
    .dialog form{padding:12px;display:grid;gap:10px}
    .dialog textarea,.dialog select{width:100%;background:var(--surface-2);color:var(--text);border:1px solid var(--border-2);border-radius:8px;padding:8px}
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="topbar" role="banner">
    <div class="topbar__row">
      <a class="home-logo" href="index.html"><img src="ui/assets/crabbie-logo.jpg" alt="Crabbie"> Crabbie Ops Home</a>
      <button type="button" class="nav-toggle" data-nav-toggle aria-controls="primary-nav" aria-expanded="false" aria-label="Toggle navigation">☰ Menu</button>
    </div>
    <h1 class="topbar__title">Team Ops (Ship 1)</h1>
    <p class="topbar__sub">Interactive task truth maintenance. Drag, review, save, or undo.</p>
    <nav id="primary-nav" class="topbar__actions" data-nav-links aria-label="Primary">
      <a class="btn" href="status.html">Status</a>
      <a class="btn" href="activity.html">Activity</a>
      <a class="btn" href="kanban.html">Pipeline</a>
      <a class="btn" href="agent-queue.html">Agent Queue</a>
      <a class="btn" href="agents.html">Agents</a>
      <a class="btn" href="team-ops.html">Team Ops</a>
    </nav>
  </header>

  <main id="main" class="wrap" tabindex="-1" aria-busy="false">
    <section class="item" style="margin:12px 16px">
      <div class="item__small" id="opsStatus">Loading tasks…</div>
    </section>
    <div class="board" id="board" role="region" aria-label="Team Ops board"></div>
  </main>

  <dialog id="editDialog" class="dialog">
    <form method="dialog" id="editForm">
      <h2 class="item__title" id="editTitle">Edit task</h2>
      <label>Notes<textarea id="editNotes" rows="6" required></textarea></label>
      <label>Agent<select id="editAgent">
        <option>build</option><option>crm</option><option>ops</option><option>strategy</option><option>ui</option><option>research</option><option>jobs</option><option>copy</option>
      </select></label>
      <label>Priority<select id="editPriority">
        <option>High</option><option>Medium</option><option>Low</option>
      </select></label>
      <div class="task-actions">
        <button class="btn" value="cancel">Cancel</button>
        <button class="btn btn--primary" value="save">Save changes</button>
      </div>
    </form>
  </dialog>

  <script src="ui/team_ops_v1.js"></script>
  <script src="ui/nav_v1.js"></script>
</body>
</html>
