<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Agent Profiles · Crabbie Ops</title>
  <link rel="stylesheet" href="ui/STYLE_TOKENS_V1.css">
  <link rel="stylesheet" href="ui/COMPONENTS_V1.css">
  <style>
    .profiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;padding:16px}
    .avatar{font-size:28px}
    .textarea{width:100%;min-height:180px;background:var(--surface-2);color:var(--text);border:1px solid var(--border-2);border-radius:10px;padding:10px;font:12px/1.45 ui-monospace,Menlo,Consolas,monospace}
  </style>
</head>
<body>
  <header class="topbar" role="banner">
    <div class="topbar__row">
      <a class="home-logo" href="index.html"><img src="ui/assets/crabbie-logo.jpg" alt="Crabbie"> Crabbie Ops Home</a>
      <button class="nav-toggle" data-nav-toggle aria-expanded="false" aria-label="Toggle navigation">☰ Menu</button>
    </div>
    <h1 class="topbar__title">Specialist Agent Profiles</h1>
    <p class="topbar__sub">Live-loaded from each agent markdown profile. Editable boxes are local-only notes for review.</p>
    <nav class="topbar__actions" data-nav-links aria-label="Primary">
      <a class="btn" href="status.html">Status</a>
      <a class="btn" href="kanban.html">Pipeline</a>
      <a class="btn" href="agent-queue.html">Agent Queue</a>
      <a class="btn btn--primary" href="agents.html">Agents</a>
      <a class="btn" href="cv-preview.html">CV Preview</a>
    </nav>
  </header>

  <main class="profiles" id="main"></main>

  <script>
    const AGENTS = [
      {key:'tide', emoji:'😎', name:'Tide', fn:'PM Control Tower'},
      {key:'vantage', emoji:'🧐', name:'Vantage', fn:'UX Strategist / Role Analyst'},
      {key:'polish', emoji:'🤡', name:'Polish', fn:'UI Designer / Visual Quality'},
      {key:'forge', emoji:'😤', name:'Forge', fn:'CV Strategist'},
      {key:'ledger', emoji:'😬', name:'Ledger', fn:'CRM Manager'},
      {key:'radar', emoji:'😵', name:'Radar', fn:'Opportunity Scout'},
      {key:'atlas', emoji:'🥶', name:'Atlas', fn:'Research & Contact Intel'}
    ];

    async function loadProfile(agent){
      const card = document.createElement('section');
      card.className = 'item';
      card.innerHTML = `<h2 class='item__title'><span class='avatar'>${agent.emoji}</span> ${agent.name}</h2><div class='item__meta'>${agent.fn}</div><textarea class='textarea' id='ta-${agent.key}'></textarea><div class='item__small'>Live source: agents/${agent.key}.md</div>`;
      document.getElementById('main').appendChild(card);
      const ta = document.getElementById('ta-'+agent.key);
      try {
        const res = await fetch(`agents/${agent.key}.md?t=${Date.now()}`);
        const txt = await res.text();
        ta.value = txt;
      } catch (e) {
        ta.value = 'Could not load profile markdown.';
      }
      const localKey = `agent-edit-${agent.key}`;
      if(localStorage.getItem(localKey)) ta.value = localStorage.getItem(localKey);
      ta.addEventListener('input', ()=>localStorage.setItem(localKey, ta.value));
    }
    AGENTS.forEach(loadProfile);
  </script>
  <script src="ui/nav_v1.js"></script>
</body>
</html>
