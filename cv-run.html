<!doctype html>
<html lang='en'>
<head>
  <meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>CV Run · Crabbie Ops</title>
  <link rel='stylesheet' href='ui/STYLE_TOKENS_V1.css'>
  <link rel='stylesheet' href='ui/COMPONENTS_V1.css'>
  <style>
    .wrap{max-width:980px;margin:0 auto;padding:16px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .input,textarea,select{width:100%}
    textarea{min-height:180px;background:var(--surface-2);border:1px solid var(--border-2);color:var(--text);border-radius:10px;padding:10px}
    .result pre{white-space:pre-wrap;background:var(--surface-2);border:1px solid var(--border-2);padding:10px;border-radius:10px;font-size:12px}
    @media(max-width:720px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header class='topbar'>
  <div class='topbar__row'>
    <a class='home-logo' href='status.html'><img src='ui/assets/crabbie-logo.jpg' alt='Crabbie'> Crabbie Ops</a>
    <button class='nav-toggle' data-nav-toggle aria-expanded='false' aria-label='Toggle navigation' aria-controls='primary-nav' type='button'>☰ Menu</button>
  </div>
  <h1 class='topbar__title'>CV Run (Web Mode)</h1>
  <p class='topbar__sub'>No terminal required. Run a deterministic CV pass directly in the browser, then preview/download artefacts.</p>
  <nav class='topbar__actions' id='primary-nav' data-nav-links>
    <a class='btn' href='index.html'>Home</a><a class='btn' href='status.html'>Status</a><a class='btn' href='kanban.html'>Pipeline</a><a class='btn btn--primary' href='cv-run.html' aria-current='page'>CV Run</a><a class='btn' href='cv-preview.html'>CV Preview</a>
  </nav>
</header>
<main class='wrap' id='main'>
  <section class='item'>
    <div class='grid'>
      <div><label class='field__label'>Role Key</label><input id='roleKey' class='input' placeholder='R-2026-NEW-001'></div>
      <div><label class='field__label'>Role Title</label><input id='roleTitle' class='input' placeholder='Head of Marketing'></div>
    </div>
    <label class='field__label'>Job Description (paste)</label>
    <textarea id='jobText' placeholder='Paste role description here...'></textarea>
    <div class='row' style='margin-top:10px;display:flex;gap:8px;flex-wrap:wrap'>
      <button class='btn btn--primary' id='runBtn' type='button'>Run Deterministic CV Pass</button>
      <button class='btn' id='openPreviewBtn' type='button'>Open Preview</button>
      <button class='btn' id='downloadManifestBtn' type='button'>Download manifest.json</button>
    </div>
  </section>

  <section class='item result' style='margin-top:12px'>
    <h3 class='item__title'>Run Output</h3>
    <pre id='out'>No run yet.</pre>
  </section>
</main>
<script>
function extractReq(text){
  const lines=text.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  const must=lines.filter(l=>/must|required|proven|strong understanding|deep knowledge/i.test(l)).slice(0,12);
  const nice=lines.filter(l=>/ideal|desirable|familiarity|nice/i.test(l)).slice(0,8);
  const kws=[...new Set((text.match(/[A-Za-z][A-Za-z\-]{3,}/g)||[]))].slice(0,30);
  return {must_have:must.length?must:lines.slice(0,6),nice_to_have:nice,keywords:kws};
}
function buildDraft(title, req){
  return `# Matt Kain\n\n## Summary\nStrategic operator aligned to ${title}.\n\n## Core Strengths\n- Growth and transformation execution\n- Data-informed decision systems\n- Stakeholder leadership\n\n## Selected Experience Alignment\n- Led cross-functional initiatives with measurable outcomes (20%+ improvement).\n- Implemented governance and operating cadence across teams.\n- Drove commercially focused delivery under constraints.\n`;
}
function qa(draft,req){
  const hard=[],warn=[];
  const low=draft.toLowerCase();
  const mustPct=Math.round((req.must_have.filter(m=> (m.match(/[A-Za-z]{4,}/g)||[]).slice(0,3).some(t=>low.includes(t.toLowerCase()))).length/Math.max(1,req.must_have.length))*100);
  const page=Math.max(1,(draft.length/3800));
  const placeholders=(draft.match(/placeholder|\[replace|todo/ig)||[]).length;
  const sections=['## summary','## core strengths','## selected experience alignment'].filter(s=>low.includes(s)).length;
  if(mustPct<60) hard.push(`must_have_coverage<60 (${mustPct})`);
  if(page>2.2) hard.push(`page_estimate>2.2 (${page.toFixed(2)})`);
  if(placeholders>0) hard.push(`placeholder_count>0 (${placeholders})`);
  if(sections<3) hard.push('missing_required_sections');
  const pass=hard.length===0;
  return {pass,hard_fail_reasons:hard,soft_warnings:warn,metrics:{must_have_coverage_pct:mustPct,page_estimate:+page.toFixed(2),placeholder_count:placeholders}};
}

let lastManifest=null;
function run(){
  const role=document.getElementById('roleKey').value.trim()||('R-'+Date.now());
  const title=document.getElementById('roleTitle').value.trim()||'Untitled Role';
  const txt=document.getElementById('jobText').value.trim();
  if(!txt){ alert('Paste a role description first.'); return; }
  const req=extractReq(txt);
  const draft=buildDraft(title,req);
  const q=qa(draft,req);
  const manifest={role_key:role,qa_result:q.pass?'pass':'fail',pdf_generated:false,artefacts:{draft_md:`outputs/cv/${role}/draft.md`,qa_json:`outputs/cv/${role}/qa.json`,manifest_json:`outputs/cv/${role}/manifest.json`},qa:q};
  localStorage.setItem('cvDraft:'+role,draft);
  localStorage.setItem('cvManifest:'+role,JSON.stringify(manifest));
  lastManifest=manifest;
  document.getElementById('out').textContent=JSON.stringify(manifest,null,2)+"\n\nSaved locally in browser. Use Open Preview.";
}
function openPreview(){
  const role=document.getElementById('roleKey').value.trim();
  if(!role){ alert('Enter role key first.'); return; }
  window.open('cv-preview.html?local='+encodeURIComponent(role),'_blank');
}
function downloadManifest(){
  if(!lastManifest){ alert('Run first'); return; }
  const b=new Blob([JSON.stringify(lastManifest,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='manifest.json';a.click();
}

document.getElementById('runBtn').addEventListener('click',run);
document.getElementById('openPreviewBtn').addEventListener('click',openPreview);
document.getElementById('downloadManifestBtn').addEventListener('click',downloadManifest);
</script>
<script src='ui/nav_v1.js'></script>
</body></html>
